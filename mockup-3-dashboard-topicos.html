<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Arbiter — mockup 3: dashboard de tópicos</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: { colors: {
      brand: "#534ab7", "brand-light": "#edeaff", ink: "#232323",
      muted: "#85827c", panel: "#f0eee8", line: "#dfdcd4", bg: "#faf9f6",
    }, fontFamily: { sans: ["Inter","ui-sans-serif","system-ui","sans-serif"] } } },
  };
</script>
<style> body { background:#faf9f6; color:#232323; } </style>
</head>
<body class="font-sans">

  <div class="bg-[#534ab7] text-white text-center text-xs font-bold py-1.5">
    mockup de layout — "3. dashboard de tópicos" — não é o site em produção
  </div>

  <header class="flex items-center justify-between max-w-[1000px] mx-auto min-h-[72px] px-4 border-b border-line">
    <a class="inline-flex items-center gap-2.5 font-black no-underline" href="#">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" rx="7" fill="#534ab7"/>
        <line x1="16" y1="4" x2="7" y2="26" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="16" y1="4" x2="25" y2="26" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="4" y1="17" x2="28" y2="17" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span>arbiter</span>
    </a>
    <nav class="flex gap-7 text-muted text-[0.9rem] font-bold">
      <a class="hover:text-ink" href="#">fontes</a>
      <a class="hover:text-ink" href="#">docs</a>
    </nav>
  </header>

  <section class="max-w-[1000px] mx-auto px-4 pt-10 pb-4 text-center">
    <h1 class="text-[clamp(1.6rem,3.6vw,2.1rem)] font-black mb-2">explore por tópico ou descreva seu contexto</h1>
    <p class="text-muted font-bold mb-8">nao sabe o que perguntar? comece navegando pelas decisoes que ja existem.</p>
  </section>

  <section class="max-w-[1000px] mx-auto px-4 mb-10">
    <div class="grid gap-4 grid-cols-4" id="topic-grid"></div>
  </section>

  <section class="max-w-[760px] mx-auto px-4 mb-12 text-center">
    <form id="search-form" class="grid gap-3 grid-cols-[minmax(0,1fr)_auto]">
      <input id="query" type="search" placeholder="ou descreva seu contexto livremente..."
        class="bg-white border border-[#ccc8bd] rounded-lg text-ink font-bold min-h-[48px] outline-none px-5 w-full shadow-sm focus:border-brand" />
      <button class="inline-flex items-center justify-center rounded-lg font-extrabold min-h-[48px] px-6 bg-brand text-white hover:bg-[#4540a0]" type="submit">buscar</button>
    </form>
  </section>

  <section class="max-w-[1000px] mx-auto px-4 pb-20" id="detail-section" hidden>
    <div class="border-t border-line pt-7 mb-5 flex items-center justify-between">
      <h2 class="text-[1.1rem] font-black" id="detail-title"></h2>
      <button class="text-muted text-[0.84rem] font-black hover:text-ink" onclick="document.getElementById('detail-section').hidden = true">fechar ✕</button>
    </div>
    <div class="grid gap-4 grid-cols-2" id="detail-grid"></div>
  </section>

<script>
const TOPICS = [
  { key:"mensageria", icon:"M2 9h5M11 9h5M6 5.5L2 9l4 3.5M12 5.5l4 3.5-4 3.5" },
  { key:"banco de dados", icon:"M10 3H4a1 1 0 00-1 1v10a1 1 0 001 1h10a1 1 0 001-1V8" },
  { key:"arquitetura", icon:"M9 8v4M9 8v4" },
  { key:"linguagem", icon:"M9 2v14M2 9h14" },
];

const DECISIONS = [
  { empresa:"Dagster", topic:"mensageria", verdict:"rejected", title:"rejeitou Kafka", context:"startup pequena, time enxuto, logs near-real-time", color:"#edeaff", tone:"#534ab7" },
  { empresa:"Disney+ Hotstar", topic:"mensageria", verdict:"adopted", title:"adotou Kafka", context:"50M usuarios simultaneos em evento ao vivo", color:"#dcf5ec", tone:"#14866d" },
  { empresa:"Shopify", topic:"mensageria", verdict:"kept", title:"manteve RabbitMQ", context:"workloads variados, custo alto de migracao completa", color:"#fde8f0", tone:"#b44d70" },
  { empresa:"LinkedIn", topic:"mensageria", verdict:"adopted", title:"criou Kafka internamente", context:"pipeline em tempo real, nenhuma ferramenta aguentava o volume", color:"#e8f0f8", tone:"#0077b5" },
  { empresa:"Discord", topic:"banco de dados", verdict:"adopted", title:"adotou Cassandra", context:"100M mensagens por dia, MongoDB sem escalar", color:"#e8edff", tone:"#3d5af1" },
  { empresa:"Uber", topic:"banco de dados", verdict:"rejected", title:"saiu do Postgres para MySQL", context:"escala global, alta taxa de escrita", color:"#eaf5de", tone:"#5a8b2d" },
  { empresa:"Notion", topic:"banco de dados", verdict:"adopted", title:"shardeou o Postgres", context:"bilhoes de linhas, evitou migrar para NoSQL", color:"#f0f0eb", tone:"#37352f" },
  { empresa:"Stack Overflow", topic:"banco de dados", verdict:"rejected", title:"rejeitou NoSQL", context:"bilhoes de page views, manteve SQL Server tunado", color:"#fff3e0", tone:"#b35a00" },
  { empresa:"Basecamp", topic:"arquitetura", verdict:"rejected", title:"recusou microservices", context:"produto maduro, time pequeno, pressao da industria", color:"#e8f5e8", tone:"#2d6a2d" },
  { empresa:"Airbnb", topic:"arquitetura", verdict:"adopted", title:"migrou monolito para SOA", context:"time crescendo rapido, dominios acoplados", color:"#ffe8ef", tone:"#cc0050" },
  { empresa:"Amazon", topic:"arquitetura", verdict:"adopted", title:"mandatou APIs entre times", context:"monolito incontrolavel, deploys lentos", color:"#fff8e0", tone:"#a07000" },
  { empresa:"Shopify", topic:"arquitetura", verdict:"rejected", title:"criou monolito modular", context:"centenas de engenheiros, pressao para quebrar em microservices", color:"#fde8f0", tone:"#b44d70" },
  { empresa:"Discord", topic:"linguagem", verdict:"rejected", title:"saiu de Go para Rust", context:"GC do Go causava spikes de latencia", color:"#e8edff", tone:"#3d5af1" },
  { empresa:"Dropbox", topic:"linguagem", verdict:"adopted", title:"migrou Python para Go", context:"GIL limitando uso de CPU multi-core", color:"#e8f2ff", tone:"#0061ff" },
];
const TAG = { adopted:"bg-[#e6f4df] text-[#47771d]", rejected:"bg-[#fff3d8] text-[#9c6414]", kept:"bg-[#e8f1ff] text-[#2f679b]" };
const LABEL = { adopted:"adotou", rejected:"rejeitou", kept:"manteve" };

function isConflict(a,b){ return a!==b && a.topic===b.topic && a.verdict!==b.verdict && [a.verdict,b.verdict].includes("adopted") && [a.verdict,b.verdict].includes("rejected"); }

function countConflicts(topic){
  const pool = DECISIONS.filter(d => d.topic === topic);
  let n = 0;
  pool.forEach(d => { if (pool.some(o => isConflict(d,o))) n++; });
  return Math.floor(n/2);
}

document.getElementById("topic-grid").innerHTML = TOPICS.map(t => {
  const count = DECISIONS.filter(d=>d.topic===t.key).length;
  const conflicts = countConflicts(t.key);
  return `<button onclick="openTopic('${t.key}')" class="bg-white border border-line rounded-xl shadow-sm p-5 text-center hover:shadow-md hover:-translate-y-0.5 transition-all">
    <div class="inline-flex items-center justify-center w-9 h-9 rounded-lg bg-brand-light text-brand mb-3">
      <svg width="16" height="16" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="${t.icon}" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="font-bold text-[0.92rem] mb-1">${t.key}</div>
    <div class="text-muted text-[0.76rem] font-bold">${count} decisoes${conflicts ? ` · ${conflicts} conflito${conflicts>1?"s":""}` : ""}</div>
  </button>`;
}).join("");

function openTopic(topic){
  const list = DECISIONS.filter(d => d.topic === topic);
  document.getElementById("detail-title").textContent = topic + " — " + list.length + " decisoes";
  document.getElementById("detail-grid").innerHTML = list.map(d => {
    const conflict = list.some(o => isConflict(d,o));
    return `<article class="bg-white border ${conflict ? "border-[#f0c178]" : "border-line"} rounded-xl px-6 pt-6 pb-4">
      <div class="flex items-center gap-2.5 mb-3 flex-wrap">
        <span class="rounded-md text-[0.78rem] font-black px-2.5 py-1.5" style="background:${d.color};color:${d.tone}">${d.empresa}</span>
        <span class="rounded-full inline-flex items-center text-[0.78rem] font-black min-h-[25px] px-3 ml-auto ${TAG[d.verdict]}">${LABEL[d.verdict]}</span>
      </div>
      <h3 class="text-[1.05rem] font-bold mb-1.5">${d.title}</h3>
      <p class="text-muted text-[0.92rem] font-bold leading-snug m-0">${d.context}</p>
    </article>`;
  }).join("");
  document.getElementById("detail-section").hidden = false;
  document.getElementById("detail-section").scrollIntoView({ behavior:"smooth" });
}

document.getElementById("search-form").addEventListener("submit", e => {
  e.preventDefault();
  const q = document.getElementById("query").value.toLowerCase();
  const list = DECISIONS.filter(d => (d.title+d.context+d.empresa).toLowerCase().includes(q));
  document.getElementById("detail-title").textContent = "resultados para \"" + document.getElementById("query").value + "\"";
  document.getElementById("detail-grid").innerHTML = list.map(d => `<article class="bg-white border border-line rounded-xl px-6 pt-6 pb-4">
      <span class="rounded-md text-[0.78rem] font-black px-2.5 py-1.5" style="background:${d.color};color:${d.tone}">${d.empresa}</span>
      <h3 class="text-[1.05rem] font-bold mt-3 mb-1.5">${d.title}</h3>
      <p class="text-muted text-[0.92rem] font-bold leading-snug m-0">${d.context}</p>
    </article>`).join("") || `<p class="text-muted font-bold">nada encontrado.</p>`;
  document.getElementById("detail-section").hidden = false;
  document.getElementById("detail-section").scrollIntoView({ behavior:"smooth" });
});
</script>
</body>
</html>
